<?xml version="1.0" encoding="UTF-8"?>
<!--
  AImplementace.cz — horizontal logo
  Dark background version (web, e-mailová signatura na tmavém pozadí)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 40"
     width="540" height="80"
     role="img" aria-label="AImplementace.cz">
  <title>AImplementace.cz</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&amp;display=block');
    </style>
    <linearGradient id="mgd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- ── Mark ── -->
  <path d="M 20 4 L 34 12 L 34 28 L 20 36 L 6 28 L 6 12 Z"
        stroke="url(#mgd)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <path d="M 6 28 L 20 4 L 34 28"
        stroke="url(#mgd)" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="13" y1="20" x2="27" y2="20"
        stroke="url(#mgd)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="4" x2="20" y2="36"
        stroke="url(#mgd)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="4"  r="2.5" fill="#06b6d4"/>
  <circle cx="6"  cy="28" r="2.5" fill="#8b5cf6"/>
  <circle cx="34" cy="28" r="2.5" fill="#8b5cf6"/>
  <circle cx="20" cy="36" r="2.5" fill="#06b6d4"/>
  <circle cx="13" cy="20" r="2"   fill="#8b5cf6"/>
  <circle cx="27" cy="20" r="2"   fill="#8b5cf6"/>
  <circle cx="20" cy="20" r="2"   fill="#06b6d4"/>

  <!-- ── Wordmark ── -->
  <text x="52" y="28.5"
        font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="22" letter-spacing="-0.6">
    <tspan fill="#8b5cf6" font-weight="900">AI</tspan><tspan fill="#f5f7ff" font-weight="700">mplementace</tspan><tspan fill="#6b7280" font-weight="700">.cz</tspan>
  </text>
</svg>
