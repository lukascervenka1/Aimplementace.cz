<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="40" height="40" rx="8" fill="#0d0e12"/>

  <!-- Hexagon outline -->
  <path
    d="M 20 4 L 34 12 L 34 28 L 20 36 L 6 28 L 6 12 Z"
    stroke="url(#logoGrad)"
    stroke-width="1.5"
    fill="none"
    filter="url(#logoGlow)"
  />
  <!-- A legs -->
  <path
    d="M 6 28 L 20 4 L 34 28"
    stroke="url(#logoGrad)"
    stroke-width="2"
    fill="none"
    filter="url(#logoGlow)"
  />
  <!-- Horizontal bar -->
  <line
    x1="13" y1="20" x2="27" y2="20"
    stroke="url(#logoGrad)"
    stroke-width="1.5"
    filter="url(#logoGlow)"
  />
  <!-- Vertical axis (I) -->
  <line
    x1="20" y1="4" x2="20" y2="36"
    stroke="url(#logoGrad)"
    stroke-width="1.5"
    filter="url(#logoGlow)"
  />
  <!-- Nodes -->
  <circle cx="20" cy="4"  r="2.5" fill="#06b6d4"/>
  <circle cx="6"  cy="28" r="2.5" fill="#8b5cf6"/>
  <circle cx="34" cy="28" r="2.5" fill="#8b5cf6"/>
  <circle cx="20" cy="36" r="2.5" fill="#06b6d4"/>
  <circle cx="13" cy="20" r="2"   fill="#8b5cf6"/>
  <circle cx="27" cy="20" r="2"   fill="#8b5cf6"/>
  <circle cx="20" cy="20" r="2"   fill="#06b6d4"/>
</svg>
