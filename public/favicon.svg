<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#151611"/>
  <!-- A shape -->
  <path
    d="M18 50 L32 16 L46 50"
    stroke="url(#g)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Crossbar -->
  <line x1="23" y1="38" x2="41" y2="38" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Dot (caramel) -->
  <circle cx="32" cy="10" r="3.5" fill="#f6bc7c"/>
  <defs>
    <linearGradient id="g" x1="18" y1="50" x2="46" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d9eafa"/>
      <stop offset="100%" stop-color="#f6bc7c"/>
    </linearGradient>
  </defs>
</svg>
